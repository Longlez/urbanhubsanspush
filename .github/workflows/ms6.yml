name: MS6 - Unified Microservices CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - "ms-alerte-usager/**"
      - "ms-analyse/**"
      - "ms-collecte-iot/**"
      - "ms-journalisation/**"
      - ".github/workflows/ms6.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "ms-alerte-usager/**"
      - "ms-analyse/**"
      - "ms-collecte-iot/**"
      - "ms-journalisation/**"
      - ".github/workflows/ms6.yml"

env:
  PYTHON_VERSION: "3.12"
  SERVICES: '["ms-alerte-usager", "ms-analyse", "ms-collecte-iot", "ms-journalisation"]'

jobs:
  # === MS-ALERTE-USAGER ===
  ms-alerte-usager-install:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'ms-alerte-usager/') || github.event_name == 'pull_request'
    env:
      SERVICE: ms-alerte-usager
    defaults:
      run:
        working-directory: ms-alerte-usager

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-alerte-usager/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

  ms-alerte-usager-test:
    runs-on: ubuntu-latest
    needs: ms-alerte-usager-install
    env:
      SERVICE: ms-alerte-usager
      PYTHONPATH: ${{ github.workspace }}/ms-alerte-usager
    defaults:
      run:
        working-directory: ms-alerte-usager

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-alerte-usager/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest test/unit --junitxml=report_tests.xml --cov=src --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=80

  ms-alerte-usager-quality:
    runs-on: ubuntu-latest
    needs: ms-alerte-usager-test
    env:
      SERVICE: ms-alerte-usager
      PYTHONPATH: ${{ github.workspace }}/ms-alerte-usager
    defaults:
      run:
        working-directory: ms-alerte-usager

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-alerte-usager/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt flake8

      - name: Lint flake8
        run: |
          flake8 src test --config=.flake8 --output-file=flake8-report.txt

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ startsWith(secrets.SONAR_HOST_URL, 'http') && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: ms-alerte-usager

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=ms-alerte-usager/requirements.txt --severity-threshold=high --fail-on=all

  # === MS-ANALYSE ===
  ms-analyse-install:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'ms-analyse/') || github.event_name == 'pull_request'
    env:
      SERVICE: ms-analyse
    defaults:
      run:
        working-directory: ms-analyse

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-analyse/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  ms-analyse-test:
    runs-on: ubuntu-latest
    needs: ms-analyse-install
    env:
      SERVICE: ms-analyse
      PYTHONPATH: ${{ github.workspace }}/ms-analyse
      DATABASE_URL: sqlite:///./test_ms_analyse.db
    defaults:
      run:
        working-directory: ms-analyse

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-analyse/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest -q

  ms-analyse-quality:
    runs-on: ubuntu-latest
    needs: ms-analyse-test
    env:
      SERVICE: ms-analyse
      PYTHONPATH: ${{ github.workspace }}/ms-analyse
      DATABASE_URL: sqlite:///./test_ms_analyse.db
    defaults:
      run:
        working-directory: ms-analyse

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-analyse/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run coverage gate
        run: |
          python -m pytest --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80 -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: ms-analyse-coverage
          path: ms-analyse/coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ startsWith(secrets.SONAR_HOST_URL, 'http') && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: ms-analyse

  # === MS-COLLECTE-IOT ===
  ms-collecte-iot-install:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'ms-collecte-iot/') || github.event_name == 'pull_request'
    env:
      SERVICE: ms-collecte-iot
    defaults:
      run:
        working-directory: ms-collecte-iot

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-collecte-iot/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

  ms-collecte-iot-test:
    runs-on: ubuntu-latest
    needs: ms-collecte-iot-install
    env:
      SERVICE: ms-collecte-iot
      PYTHONPATH: ${{ github.workspace }}/ms-collecte-iot
    defaults:
      run:
        working-directory: ms-collecte-iot

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-collecte-iot/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest test/unit --junitxml=report_tests.xml --cov=src --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=80

  ms-collecte-iot-quality:
    runs-on: ubuntu-latest
    needs: ms-collecte-iot-test
    env:
      SERVICE: ms-collecte-iot
      PYTHONPATH: ${{ github.workspace }}/ms-collecte-iot
    defaults:
      run:
        working-directory: ms-collecte-iot

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-collecte-iot/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt flake8

      - name: Lint flake8
        run: |
          flake8 src test --config=.flake8 --output-file=flake8-report.txt

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ startsWith(secrets.SONAR_HOST_URL, 'http') && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: ms-collecte-iot

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=ms-collecte-iot/requirements.txt --severity-threshold=high --fail-on=all

  # === MS-JOURNALISATION ===
  ms-journalisation-install:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'ms-journalisation/') || github.event_name == 'pull_request'
    env:
      SERVICE: ms-journalisation
    defaults:
      run:
        working-directory: ms-journalisation

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-journalisation/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  ms-journalisation-test:
    runs-on: ubuntu-latest
    needs: ms-journalisation-install
    env:
      SERVICE: ms-journalisation
      PYTHONPATH: ${{ github.workspace }}/ms-journalisation
    defaults:
      run:
        working-directory: ms-journalisation

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-journalisation/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: |
          pytest tests/ -v --junitxml=pytest_report.xml --cov=src --cov-report=xml:coverage.xml --cov-report=term-missing

  ms-journalisation-quality:
    runs-on: ubuntu-latest
    needs: ms-journalisation-test
    env:
      SERVICE: ms-journalisation
      PYTHONPATH: ${{ github.workspace }}/ms-journalisation
    defaults:
      run:
        working-directory: ms-journalisation

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ms-journalisation/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8

      - name: Run coverage gate
        run: |
          pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml -q

      - name: Lint flake8
        run: |
          flake8 src tests --config=.flake8 --output-file=flake8-report.txt || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: ms-journalisation-coverage
          path: ms-journalisation/coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ startsWith(secrets.SONAR_HOST_URL, 'http') && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: ms-journalisation

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=ms-journalisation/requirements.txt --severity-threshold=high --fail-on=all

  # === BUILD & DEPLOY ===
  build:
    runs-on: ubuntu-latest
    needs: [ms-alerte-usager-quality, ms-analyse-quality, ms-collecte-iot-quality, ms-journalisation-quality]

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ms-alerte-usager Docker image
        run: docker build -t ms-alerte-usager:ci ./ms-alerte-usager

      - name: Build ms-analyse Docker image
        run: docker build -t ms-analyse:ci ./ms-analyse

      - name: Build ms-collecte-iot Docker image
        run: docker build -t ms-collecte-iot:ci ./ms-collecte-iot

      - name: Build ms-journalisation Docker image
        run: docker build -t ms-journalisation:ci ./ms-journalisation

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy all microservices
        run: |
          echo "🚀 Deployment ready for all microservices:"
          echo "  - ms-alerte-usager"
          echo "  - ms-analyse"
          echo "  - ms-collecte-iot"
          echo "  - ms-journalisation"
          echo ""
          echo "Configure real deployment commands here:"
          echo "  - Docker registry push"
          echo "  - Kubernetes deployment"
          echo "  - SSH deployment"
          echo "  - Cloud platform deployment (AWS, GCP, Azure)"
