name: MS Journalisation CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - "ms-journalisation/**"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "ms-journalisation/**"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-journalisation
    env:
      PYTHON_VERSION: "3.12"
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python and install dependencies
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run unit tests with coverage
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest --junitxml=rapport_tests.xml \
            --cov=src \
            --cov-report=xml \
            --cov-report=html:coverage_html \
            --cov-report=term-missing | tee rapport_tests.txt

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: ms-journalisation-test-reports
          path: |
            ms-journalisation/rapport_tests.txt
            ms-journalisation/rapport_tests.xml
            ms-journalisation/coverage_html
            ms-journalisation/coverage.xml

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          extraArgs: >
            -Dsonar.projectKey=ms-journalisation
            -Dsonar.sources=src
            -Dsonar.python.version=3.12

      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: test --file=requirements.txt --severity-threshold=high --all-projects
