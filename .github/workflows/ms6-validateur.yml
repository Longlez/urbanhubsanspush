name: MS6 Validateur Capteur CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - "ms6-validateur-capteur/**"
      - ".github/workflows/ms6-validateur.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "ms6-validateur-capteur/**"
      - ".github/workflows/ms6-validateur.yml"

env:
  PYTHON_VERSION: "3.12"

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms6-validateur-capteur

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run tests
        run: |
          pytest tests/test_validator.py --junitxml=report_tests.xml --cov=src --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=80

      - name: Run lint
        run: |
          flake8 src tests --config=.flake8

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: ms6-validateur-coverage
          path: ms6-validateur-capteur/coverage.xml

  sonar-scan:
    needs: install-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms6-validateur-capteur

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ startsWith(secrets.SONAR_HOST_URL, 'http') && secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}
        with:
          projectBaseDir: ms6-validateur-capteur

  snyk-scan:
    needs: install-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms6-validateur-capteur

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=requirements.txt --severity-threshold=high --fail-on=all
